name: Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # Runs daily at 11:30 AM India
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout (updated version)
    - name: Checkout repo
      uses: actions/checkout@v4

    # ✅ Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # ✅ Install Chrome + Driver
    - name: Install Chrome
      run: |
        sudo apt update
        sudo apt install -y chromium-browser

    # ✅ Install dependencies
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # ✅ Run scraper
    - name: Run scraper
      run: |
        python scraper.py

    # ✅ Commit & Push changes safely
    - name: Commit updated DB
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add metals.db

        # Only commit if there are changes
        git diff --cached --quiet || git commit -m "daily data update"

        git push
